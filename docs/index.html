<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Protest Tracker Reports</title>
  <style>
    :root{color-scheme:light dark}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;max-width:900px;margin:40px auto;padding:0 16px;line-height:1.4;background:#fff;color:#111}
    .card{border:1px solid #ddd;border-radius:12px;padding:18px}
    a.button{display:inline-block;padding:10px 14px;border-radius:10px;border:1px solid #333;text-decoration:none;margin-right:10px;color:inherit}
    small{color:#555}
    @media(prefers-color-scheme:dark){
      body{background:#111;color:#e8e8e8}
      .card{border-color:#333}
      a.button{border-color:#666}
      small{color:#999}
    }
  </style>
</head>
<body>
  <h1>Protest Tracker</h1>

  <div class="card">
    <p>
      <a class="button" href="./latest.xlsx">Download latest report (.xlsx)</a>
      <a class="button" href="./previous.xlsx">Download previous report (.xlsx)</a>
    </p>

    <p><small>Last updated: <span id="lastUpdated">loading…</span></small></p>
    <p><small>Coverage: <b>General</b> = next 7 days, <b>NoKings</b> = next 30 days.</small></p>
    <p><small>If you get “file not found,” wait a minute and refresh (GitHub Pages sometimes lags after updates).</small></p>
  </div>

  <script>
    fetch("./last_updated.txt", { cache: "no-store" })
      .then(r => r.ok ? r.text() : Promise.reject())
      .then(t => document.getElementById("lastUpdated").textContent = t.trim())
      .catch(() => document.getElementById("lastUpdated").textContent = "not available yet");
  </script>
</body>
</html>
