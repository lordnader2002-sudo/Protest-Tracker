name: Protest Tracker

on:
  workflow_dispatch:
    inputs:
      radius_miles:
        description: 'Search radius in miles (default: 3)'
        required: false
        default: '3'
      no_kings_window_days:
        description: 'No Kings look-ahead window in days (default: 30)'
        required: false
        default: '30'
      workers:
        description: 'Parallel worker threads (default: 8)'
        required: false
        default: '8'
  schedule:
    - cron: "0 17 * * 1,3,5"

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tracker
        run: |
          mkdir -p outputs
          echo "=== Tracker start: $(date -u) ==="
          time python "scripts/Simon OIC Intel - Protest Tracker Script v9.1.py" \
            --properties "data/properties.csv" \
            --output-dir "outputs" \
            --output-prefix "mobilize_protests" \
            --keep-all-matches \
            --append \
            --no-kings \
            --no-kings-window-days "${{ inputs.no_kings_window_days || '30' }}" \
            --radius-miles "${{ inputs.radius_miles || '3' }}" \
            --seen-store "seen_events.json" \
            --workers "${{ inputs.workers || '8' }}" \
            --min-request-interval 0.1 \
            --progress
          echo "=== Tracker end: $(date -u) ==="

      - name: Publish latest report to GitHub Pages (docs/latest.xlsx)
        run: |
          mkdir -p docs

          # Move old latest to previous (if it exists)
          if [ -f "docs/latest.xlsx" ]; then
            cp "docs/latest.xlsx" "docs/previous.xlsx"
          fi

          # Copy newest output and map data to docs/
          LATEST="$(ls -1t outputs/*.xlsx | head -n 1)"
          echo "Latest report: $LATEST"
          cp "$LATEST" docs/latest.xlsx

          if [ -f "outputs/map_data.json" ]; then
            cp outputs/map_data.json docs/map_data.json
          fi

          # Write a timestamp file (for the webpage)
          date -u +"%Y-%m-%d %H:%M UTC" > docs/last_updated.txt

      - name: Generate HTML report
        run: python scripts/generate_report.py

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: protest-tracker-run-${{ github.run_number }}
          path: docs/latest.xlsx
          retention-days: 30

      - name: Commit seen store + latest report back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -f "seen_events.json" ]; then
            git add seen_events.json
          fi

          if [ -f "docs/latest.xlsx" ]; then
            git add docs/latest.xlsx
          fi

          if [ -f "docs/previous.xlsx" ]; then
            git add docs/previous.xlsx
          fi

          if [ -f "docs/last_updated.txt" ]; then
            git add docs/last_updated.txt
          fi

          if [ -f "docs/index.html" ]; then
            git add docs/index.html
          fi

          if [ -f "docs/map_data.json" ]; then
            git add docs/map_data.json
          fi

          git commit -m "Update seen store and latest report" || echo "No changes to commit"
          git push
