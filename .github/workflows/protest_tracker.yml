name: Protest Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * *"

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tracker
        run: |
          mkdir -p outputs
          python "scripts/Simon OIC Intel - Protest Tracker Script v9.1.py" \
            --properties "data/properties.csv" \
            --output-dir "outputs" \
            --output-prefix "mobilize_protests" \
            --keep-all-matches \
            --append \
            --no-kings \
            --no-kings-window-days 30 \
            --no-autosize \
            --seen-store "seen_events.json"

      - name: Publish latest report to GitHub Pages (docs/latest.xlsx)
        run: |
          mkdir -p docs
          LATEST="$(ls -1t outputs/*.xlsx | head -n 1)"
          echo "Latest report: $LATEST"
          cp "$LATEST" docs/latest.xlsx

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: protest-tracker-output
          path: |
            outputs/*.xlsx
            seen_events.json
          if-no-files-found: error

      - name: Commit seen store + latest report back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -f "seen_events.json" ]; then
            git add seen_events.json
          fi

          if [ -f "docs/latest.xlsx" ]; then
            git add docs/latest.xlsx docs/index.html
          fi

          git commit -m "Update seen store and latest report" || echo "No changes to commit"
          git push
