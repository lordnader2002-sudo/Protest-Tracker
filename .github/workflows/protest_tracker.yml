name: Protest Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "15 12 * * *"

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tracker
        run: |
          mkdir -p outputs
          python "scripts/Simon OIC Intel - Protest Tracker Script v9.1.py" \
            --properties "data/properties.csv" \
            --output-dir "outputs" \
            --output-prefix "mobilize_protests" \
            --keep-all-matches \
            --append \
            --no-kings \
            --no-kings-window-days 30 \
            --no-autosize \
            --seen-store "seen_events.json"

      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        with:
          name: protest-tracker-output
          path: |
            outputs/*.xlsx
            seen_events.json
          if-no-files-found: error

      - name: Commit seen store back to repo
        run: |
          if [ -f "seen_events.json" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add seen_events.json
            git commit -m "Update seen events store" || echo "No changes to commit"
            git push
          else
            echo "seen_events.json not found, skipping commit."
          fi
